<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zawody — MartialMatch viewer</title>
  <link rel="stylesheet" href="../../../app.css">
</head>
<body>
  <header class="header">
    <nav class="mm-nav mm-cm-header-nav" aria-label="Nawigacja">
      <a class="mm-nav-link" href="./?tab=events" id="mm-cm-nav-home">Wydarzenia</a>
      <a
        class="mm-nav-link mm-cm-header-orig-link is-hidden"
        id="mm-cm-orig-mm-link"
        href="https://martialmatch.com/pl/events/"
        target="_blank"
        rel="noopener noreferrer"
        >Oryginał na MartialMatch</a>
    </nav>
    <div class="mm-cm-header-context">
      <p id="mm-cm-header-prompt" class="mm-cm-header-prompt">
        Wybierz aktywne zawody…
      </p>
      <div
        id="mm-cm-header-card-wrap"
        class="mm-cm-header-card-wrap is-hidden"
        aria-label="Aktywne wydarzenie"
      >
        <div id="mm-cm-header-card-root" class="mm-cm-header-card-root" aria-live="polite"></div>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="mm-cm-error" class="mm-alert mm-alert--error is-hidden" role="alert"></div>
    <div id="mm-cm-content">
      <div id="mm-cm-filter-root" class="mm-cm-filter is-hidden">
        <div
          id="mm-cm-events-toolbar"
          class="mm-cm-events-toolbar is-hidden"
          aria-label="Lista wydarzeń"
        >
          <label
            id="mm-show-all-events-wrap"
            class="mm-cm-events-toolbar__check-label"
            title="Pełna lista wydarzeń i dostępny filtr uczestników (wiele zapytań do API)."
          >
            <input
              type="checkbox"
              id="mm-show-all-events-cb"
              class="mm-show-all-events-cb"
              aria-label="Wszystkie wydarzenia — pełna lista i filtr uczestników"
            />
            <span>Wszystkie wydarzenia</span>
          </label>
          <div class="mm-cm-events-toolbar__actions">
            <button
              type="button"
              id="mm-change-active-event-btn"
              class="mm-change-active-event-btn is-hidden"
              title="Usuwa slug z adresu — pełna lista wydarzeń. Filtr zawodników w URL zostaje."
              aria-label="Zmień aktywne wydarzenie — usuwa slug, pokazuje wszystkie wydarzenia"
            >
              Zmień aktywne
            </button>
            <button
              type="button"
              id="mm-filter-main-btn-events"
              class="mm-filter-main-btn mm-filter-main-btn--compact is-hidden"
              aria-controls="mm-filter-panel"
              aria-expanded="false"
            >
              <span class="mm-filter-main-btn__label">Filtr · wszyscy</span>
              <span class="mm-filter-main-btn__chevron" aria-hidden="true">
                <svg
                  class="mm-filter-main-btn__chevron-svg"
                  width="12"
                  height="8"
                  viewBox="0 0 12 8"
                  focusable="false"
                >
                  <path fill="currentColor" d="M6 8L0 0h12L6 8z" />
                </svg>
              </span>
            </button>
          </div>
        </div>
        <button
          type="button"
          id="mm-filter-main-btn"
          class="mm-filter-main-btn mm-filter-main-btn--tab-fights"
          aria-controls="mm-filter-panel"
          aria-expanded="false"
        >
          <span class="mm-filter-main-btn__label">Filtr · wszyscy</span>
          <span class="mm-filter-main-btn__chevron" aria-hidden="true">
            <svg
              class="mm-filter-main-btn__chevron-svg"
              width="12"
              height="8"
              viewBox="0 0 12 8"
              focusable="false"
            >
              <path fill="currentColor" d="M6 8L0 0h12L6 8z" />
            </svg>
          </span>
        </button>
        <div
          id="mm-filter-panel"
          class="mm-filter-panel is-hidden"
          aria-hidden="true"
        >
          <p id="mm-filter-panel-status" class="mm-filter-panel-status mm-muted"></p>
          <div class="mm-filter-search-wrap">
            <input
              type="search"
              id="mm-filter-search-input"
              class="mm-filter-search-input"
              placeholder="Wpisz imię lub nazwisko…"
              autocomplete="off"
              enterkeyhint="search"
              inputmode="text"
              aria-label="Szukaj zawodnika po imieniu lub nazwisku"
            />
          </div>
          <div
            id="mm-filter-club-jump-wrap"
            class="mm-filter-club-jump-wrap is-hidden"
          >
            <div class="mm-filter-toolbar-row">
              <div
                class="mm-filter-toolbar-row__club"
                id="mm-filter-club-jump-club-col"
              >
                <div class="mm-filter-club-jump" id="mm-filter-club-jump-root">
                  <button
                    type="button"
                    id="mm-filter-club-jump-toggle"
                    class="mm-filter-club-jump__toggle"
                    aria-expanded="false"
                    aria-haspopup="listbox"
                    aria-controls="mm-filter-club-jump-list"
                  >
                    <span class="mm-filter-club-jump__toggle-label">Club</span>
                    <span class="mm-filter-club-jump__chevron" aria-hidden="true">
                      <svg
                        class="mm-filter-club-jump__chevron-svg"
                        width="12"
                        height="8"
                        viewBox="0 0 12 8"
                        focusable="false"
                      >
                        <path
                          fill="currentColor"
                          d="M6 8L0 0h12L6 8z"
                        />
                      </svg>
                    </span>
                  </button>
                </div>
              </div>
              <div class="mm-filter-toolbar-row__actions">
                <button
                  type="button"
                  class="mm-filter-toolbar-btn"
                  id="mm-filter-clear-all-btn"
                  title="Odznacz zawodników (na liście walk: z URL usuwani są tylko zawodnicy z bieżącego wydarzenia)."
                  aria-label="Odznacz zawodników na liście"
                >
                  Wyczyść
                </button>
                <label class="mm-filter-only-selected">
                  <input
                    type="checkbox"
                    id="mm-filter-only-selected-cb"
                    aria-label="Pokaż tylko zaznaczonych zawodników na liście"
                  />
                  <span class="mm-filter-only-selected__text">Tylko zaznaczone</span>
                </label>
              </div>
            </div>
            <ul
              id="mm-filter-club-jump-list"
              class="mm-filter-club-jump__list is-hidden"
              role="listbox"
              aria-labelledby="mm-filter-club-jump-toggle"
            ></ul>
          </div>
          <div class="mm-filter-scroll">
            <p
              id="mm-filter-only-empty-hint"
              class="mm-filter-only-empty-hint mm-muted is-hidden"
              aria-live="polite"
            ></p>
            <div class="mm-filter-sticky mm-filter-sticky--desktop">
              <button
                type="button"
                class="mm-filter-apply-btn"
                id="mm-filter-apply-sticky"
                title="Zapisz wybór w URL i odśwież widok."
                aria-label="Zastosuj filtr"
              >
                Apply Filter
              </button>
            </div>
            <div id="mm-filter-list-root" class="mm-filter-list-root"></div>
          </div>
        </div>
        <div
          id="mm-filter-mobile-bar"
          class="mm-filter-mobile-bar is-hidden"
          aria-hidden="true"
        >
          <button
            type="button"
            class="mm-filter-apply-btn"
            id="mm-filter-apply-mobile"
            title="Zapisz wybór w URL i odśwież widok."
            aria-label="Zastosuj filtr"
          >
            Apply Filter
          </button>
        </div>
      </div>
      <div
        class="mm-cm-tabs"
        role="tablist"
        aria-label="Widok zawodów"
      >
        <button
          type="button"
          class="mm-cm-tab"
          id="mm-cm-tab-events"
          role="tab"
          aria-selected="true"
          aria-controls="mm-cm-panel-events"
          tabindex="0"
        >
          Wydarzenia
        </button>
        <button
          type="button"
          class="mm-cm-tab mm-cm-tab--disabled"
          id="mm-cm-tab-fights"
          role="tab"
          aria-selected="false"
          aria-controls="mm-cm-panel-fights"
          tabindex="-1"
          disabled
          aria-disabled="true"
        >
          Przebieg walk
        </button>
        <button
          type="button"
          class="mm-cm-tab mm-cm-tab--disabled"
          id="mm-cm-tab-harmonogram"
          role="tab"
          aria-selected="false"
          aria-controls="mm-cm-panel-harmonogram"
          tabindex="-1"
          disabled
          aria-disabled="true"
        >
          Harmonogram
        </button>
      </div>
      <div
        id="mm-cm-panel-events"
        class="mm-cm-tabpanel"
        role="tabpanel"
        aria-labelledby="mm-cm-tab-events"
      >
        <p class="mm-status" id="mm-events-status" aria-live="polite"></p>
        <div class="events mm-cm-events-list" id="mm-events-list"></div>
      </div>
      <div
        id="mm-cm-panel-fights"
        class="mm-cm-tabpanel"
        role="tabpanel"
        aria-labelledby="mm-cm-tab-fights"
        hidden
      >
        <p class="mm-muted" id="mm-cm-placeholder">Ładowanie…</p>
        <p class="mm-cm-toolbar mm-muted is-hidden" id="mm-cm-toolbar" aria-live="polite"></p>
        <div class="mm-fights" id="mm-fights-list"></div>
      </div>
      <div
        id="mm-cm-panel-harmonogram"
        class="mm-cm-tabpanel"
        role="tabpanel"
        aria-labelledby="mm-cm-tab-harmonogram"
        hidden
      >
        <div id="mm-cm-harmonogram-root" class="mm-cm-harmonogram-root"></div>
      </div>
    </div>
  </main>

  <script src="../../../config.js"></script>
  <script>
    (function () {
      var a = document.getElementById("mm-cm-nav-home");
      if (a && window.MM_CONFIG && window.MM_CONFIG.withModeQuery) {
        a.href = window.MM_CONFIG.withModeQuery("./?tab=events");
      }
    })();
  </script>
  <script src="current-matches.js" defer></script>
</body>
</html>
