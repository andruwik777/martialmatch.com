<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Przebieg walk — MartialMatch viewer</title>
  <link rel="stylesheet" href="../../../app.css">
</head>
<body>
  <header class="header">
    <nav class="mm-nav">
      <a class="mm-nav-link" href="../">← Lista zawodów</a>
    </nav>
    <h1 class="title">Przebieg walk</h1>
    <p class="subtitle">Parametr <code>slug</code> (jak w URL zawodów na martialmatch.com), opcjonalnie <code>mode=test</code>. Proxy: <span id="mm-proxy-label"></span></p>
  </header>

  <main class="main">
    <div id="mm-cm-error" class="mm-alert mm-alert--error is-hidden" role="alert"></div>
    <div id="mm-cm-content">
      <p class="mm-muted" id="mm-cm-placeholder">Ładowanie…</p>
      <p class="mm-cm-toolbar mm-muted is-hidden" id="mm-cm-toolbar" aria-live="polite"></p>
      <div class="mm-fights" id="mm-fights-list"></div>
    </div>
  </main>

  <script src="../../../config.js"></script>
  <script src="current-matches.js" defer></script>
</body>
</html>
